[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:cron]
command=cron -f
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/cron.err.log
stdout_logfile=/var/log/supervisor/cron.out.log
user=root

[program:laravel-horizon]
command=php /var/www/html/artisan horizon
autostart=true
autorestart=true
startsecs=5
startretries=3
stderr_logfile=/var/log/supervisor/laravel-horizon.err.log
stdout_logfile=/var/log/supervisor/laravel-horizon.out.log
redirect_stderr=true
user=www-data
directory=/var/www/html
stopasgroup=true
killasgroup=true
environment=HOME="/var/www/html"
